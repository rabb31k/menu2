<style>
    body {
        padding: 0;

    }

    .header {

        padding: 0 2vw;

        justify-content: space-between;
        height: 60px;

    /* 菜单样式 */
    ul.menu {
        list-style-type: none;

        padding: 0;

    ul.menu li {
        display: inline-block;
        position: relative;
        margin-right: 10px;
        width: 96px;
    }

    /* 链接样式 */
    ul.menu li a {
        display: block;
        height: 60px;
        line-height: 60px;
        box-sizing: border-box;
        padding: 0 16px;
        text-decoration: none;
        /* background-color: #333; */
        color: #fff;
    }

    /* 当鼠标悬停在链接上时的样式 */
    ul.menu li a:hover {
        background-color: #434444;
    }


    ul.menu li .dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background-color: #f9f9f9;
        width: 96px;
        z-index: 1;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
    }


    ul.menu li:hover .dropdown-content {
        display: block;
        opacity: 1;
    }

    /* 下拉框中的链接样式 */
    ul.menu li .dropdown-content a {
        color: #000;
        text-align: center;
    }

    /* 当鼠标悬停在下拉框链接上时的样式 */
    ul.menu li .dropdown-content a:hover {
        background-color: #434444;
        color: white;
    }
