<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .accordion {
            position: absolute;
            top: 0;
            font-family: sans-serif;
            background-color: #c1a480;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 10px;
            padding-bottom: 0;
            box-sizing: border-box;
        }

        input[type="radio"] {
            display: none;
        }

        .accordion-item {
            background-color: #d2c6b7;
            color: #f7f5f3;
            padding: 0 10px;


            overflow: hidden;

            /* transition: max-height 0.7s ease-in-out; */
            max-height: 0;
            opacity: 1;
        }

        input[type="radio"]:checked~.accordion-item {
            max-height: 500px;
            /* 设置展开的高度 */
            opacity: 1;
        }

        .label-wrapper {
            cursor: pointer;

            /* border-bottom: 1px solid;
            width: 100vw;
            text-align: center;
            padding: 10px; */
        }

        .label-wrapper:hover .accordion-title {
            background-color: #434544;

        }

        .accordion-title span {
            position: absolute;
            right: 35vw;
        }

        .accordion-title {
            position: relative;
            background-color: transparent;
            padding: 5px;
            display: block;
            color: white;
            margin: 0 10px;
            /* margin-bottom: 0; */
            width: 100vw;
            text-align: center;
            box-sizing: border-box;
            /* transition: background-color 0.5s ease-in-out; */
            height: 50px;
            line-height: 40px;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .sitem {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            height: 40px;
        }

        a {
            font-family: sans-serif;
            color: white;
            text-decoration: none;
        }

        .mobile {
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            /* color: white; */
        }

        .toggle-content {
            display: none;
            animation: fade-in-out 0.5s ease-in-out;
            /* 添加动画 */
        }

        #toggle:checked+.toggle-content {
            display: flex;
            animation-name: fade-in;
        }

        #toggle:checked+.header {
            display: flex;
            animation-name: fade-in;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-in-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
        .header {
            /* display:; */
            background-color: #c2a480;
            width: 100vw;
            justify-content: space-between;
            display: flex;
            padding: 0 20px;
            box-sizing: border-box;
            color: #fdf9ed;
            font-weight: bold;
            align-items: center;
        }
    </style>
</head>
